  <line x1="96" y1="107" x2="75" y2="90" stroke="#10B981" stroke-width="0.5" opacity="0.15" fill="none"/>
  <line x1="164" y1="107" x2="185" y2="90" stroke="#10B981" stroke-width="0.5" opacity="0.15" fill="none"/>

