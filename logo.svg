      .hex-inner { fill: #10B981; fill-opacity: 0.08; }
      .node-dot { fill: #10B981; }
      .conn { stroke: #10B981; stroke-width: 1; fill: none; opacity: 0.35; }
      .conn-bright { stroke: #10B981; stroke-width: 1.5; fill: none; opacity: 0.7; }
      .lp { font-family: 'Syne', 'DM Sans', sans-serif; font-weight: 800; font-size: 38px; fill: #10B981; letter-spacing: -1px; }
      .rest { font-family: 'Syne', 'DM Sans', sans-serif; font-weight: 800; font-size: 38px; fill: #F8FAFC; letter-spacing: -1px; }
      .tagline { font-family: 'DM Mono', monospace; font-size: 11px; fill: #94A3B8; letter-spacing: 0.18em; text-transform: uppercase; }
      .bracket { fill: none; stroke: #10B981; stroke-width: 1.5; opacity: 0.5; stroke-linecap: round; }
      .ring { fill: none; stroke: #10B981; stroke-width: 0.5; opacity: 0.15; }
    </style>
  </defs>

  <rect width="680" height="320" rx="16" class="logo-bg"/>

