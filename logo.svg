  <line x1="130" y1="132" x2="164" y2="107" class="conn"/>
  <line x1="130" y1="132" x2="164" y2="157" class="conn"/>
  <line x1="130" y1="132" x2="130" y2="176" class="conn"/>
  <line x1="130" y1="132" x2="96" y2="157" class="conn"/>
  <line x1="130" y1="132" x2="96" y2="107" class="conn-bright"/>

  <circle cx="130" cy="68" r="2.5" fill="#10B981" opacity="0.4"/>
  <circle cx="75" cy="90" r="2.5" fill="#10B981" opacity="0.3"/>
